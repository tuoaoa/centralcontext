# ==========================================================================
# CentralContext Nginx Reverse Proxy Subpath Configuration
# Target Domain: www.aipilot.vn/centralcontext
# ==========================================================================

# Add this block inside your existing Nginx server block for www.aipilot.vn
location /centralcontext/ {
    # Forward requests to the Express server running on port 3000
    proxy_pass http://127.0.0.1:3000/;
    
    # Standard proxy headers for HTTP and WebSockets
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    
    # Real IP passing (Important for API rate limiting to work correctly)
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Increase body limits for push syncing context files
    client_max_body_size 10M;

    # Handle standard CORS preflight requests
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,x-api-key';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }
}
